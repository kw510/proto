// OAuth 2.0 authorization endpoint query parameters (RFC 6749 section 4.1.1).
message OAuth2AuthorizeRequest {
  // Must be code.
  string response_type        = 1;
  string client_id            = 2;
  optional string redirect_uri = 3;
  optional string scope       = 4;
  optional string state       = 5;
}

// OAuth 2.0 authorization redirect query parameters (RFC 6749 section 4.1.2).
message OAuth2AuthorizeResponse {
  optional string code             = 1;
  optional string scope            = 2;
  optional string state            = 3;
  optional string error            = 4;
  optional string error_description = 5;
}

// OAuth 2.0 token revocation / deauthorization request.
message OAuth2DeauthorizeRequest {
  string access_token = 1;
}

// OAuth 2.0 token revocation / deauthorization response.
message OAuth2DeauthorizeResponse {
  optional string access_token = 1;
}

// OAuth 2.0 token endpoint request parameters (RFC 6749 section 4.1.3, 6).
message OAuth2TokenRequest {
  string grant_type            = 1;
  optional string client_id    = 2;
  optional string client_secret = 3;
  optional string code         = 4;
  optional string redirect_uri = 5;
  optional string refresh_token = 6;
  optional string scope        = 7;
}

// OAuth 2.0 token endpoint response (RFC 6749 section 5.1).
message OAuth2TokenResponse {
  optional string access_token = 1;
  optional string token_type   = 2;
  optional int64 expires_in    = 3;
  optional string refresh_token = 4;
  optional string scope        = 5;
}

