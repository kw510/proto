  // point numbers.
  repeated float end_latlng                          = 10;
  // The category of the climb [0, 5]. Higher is harder ie. 5 is Hors catégorie, 0 is
  // uncategorized in climb_category.
  optional int64 climb_category                      = 11;
  // The segments's city.
  optional string city                               = 12;
  // The segments's state or geographical region.
  optional string state                              = 13;
  // The segment's country.
  optional string country                            = 14;
  // Whether this segment is private.
  optional bool private                              = 15;
  optional SummaryPRSegmentEffort athlete_pr_effort  = 16;
  optional SummarySegmentEffort athlete_segment_stats = 17;
}

message SummarySegmentEffort {
  // The unique identifier of this effort
  optional int64 id               = 1;
  // The unique identifier of the activity related to this effort
  optional int64 activity_id      = 2;
  // The effort's elapsed time
  optional int64 elapsed_time     = 3;
  // The time at which the effort was started.
  optional string start_date      = 4;
  // The time at which the effort was started in the local timezone.
  optional string start_date_local = 5;
  // The effort's distance in meters
  optional float distance         = 6;
  // Whether this effort is the current best on the leaderboard
  optional bool is_kom            = 7;
}

message TemperatureStream {
  // The number of data points in this stream
  optional int64 original_size = 1;
  // The level of detail (sampling) in which this stream was returned
  optional string resolution  = 2;
  // The base series used in the case the stream was downsampled
  optional string series_type = 3;
  // The sequence of temperature values for this stream, in celsius degrees
  repeated int64 data         = 4;
}

message TimedZoneRange {
  // The minimum value in the range.
  optional int64 min = 1;
  // The maximum value in the range.
  optional int64 max = 2;
  // The number of seconds spent in this zone
  optional int64 time = 3;
}

message TimeStream {
  // The number of data points in this stream
  optional int64 original_size = 1;
  // The level of detail (sampling) in which this stream was returned
  optional string resolution  = 2;
  // The base series used in the case the stream was downsampled
  optional string series_type = 3;
  // The sequence of time values for this stream, in seconds
  repeated int64 data         = 4;
}

message UpdatableActivity {
  // Whether this activity is a commute
  optional bool commute       = 1;
  // Whether this activity was recorded on a training machine
  optional bool trainer       = 2;
  // Whether this activity is muted
  optional bool hide_from_home = 3;
  // The description of the activity
  optional string description = 4;
  // The name of the activity
  optional string name        = 5;
  // An enumeration of the types an activity may have. Note that this enumeration does
  // not include new sport types (e.g. MountainBikeRide, EMountainBikeRide), activities
  // with these sport types will have the corresponding activity type (e.g. Ride for
  // MountainBikeRide, EBikeRide for EMountainBikeRide)
  optional string type        = 6;
  // An enumeration of the sport types an activity may have. Distinct from ActivityType
  // in that it has new types (e.g. MountainBikeRide)
  optional string sport_type  = 7;
  // Identifier for the gear associated with the activity. ‘none’ clears gear from
  // activity
  optional string gear_id     = 8;
}

// Update Activity
message UpdateActivityByIdRequest {
  int64 id                    = 1;
  // Whether this activity is a commute
  optional bool commute       = 2;
  // Whether this activity was recorded on a training machine
  optional bool trainer       = 3;
  // Whether this activity is muted
  optional bool hide_from_home = 4;
  // The description of the activity
  optional string description = 5;
  // The name of the activity
  optional string name        = 6;
  // An enumeration of the types an activity may have. Note that this enumeration does
  // not include new sport types (e.g. MountainBikeRide, EMountainBikeRide), activities
  // with these sport types will have the corresponding activity type (e.g. Ride for
  // MountainBikeRide, EBikeRide for EMountainBikeRide)
  optional string type        = 7;
  // An enumeration of the sport types an activity may have. Distinct from ActivityType
  // in that it has new types (e.g. MountainBikeRide)
  optional string sport_type  = 8;
  // Identifier for the gear associated with the activity. ‘none’ clears gear from
  // activity
  optional string gear_id     = 9;
}

// Update Athlete
message UpdateLoggedInAthleteRequest {
  float weight = 1;
}

message Upload {
  // The unique identifier of the upload
  optional int64 id          = 1;
  // The unique identifier of the upload in string format
  optional string id_str     = 2;
  // The external identifier of the upload
  optional string external_id = 3;
  // The error associated with this upload
  optional string error      = 4;
  // The status of this upload
  optional string status     = 5;
  // The identifier of the activity this upload resulted into
  optional int64 activity_id = 6;
}

message Waypoint {
  // A pair of latitude/longitude coordinates, represented as an array of 2 floating
  // point numbers.
  repeated float latlng             = 1;
  // A pair of latitude/longitude coordinates, represented as an array of 2 floating
  // point numbers.
  repeated float target_latlng      = 2;
  // Categories that the waypoint belongs to
  repeated string categories        = 3;
  // A title for the waypoint
  optional string title             = 4;
  // A description of the waypoint (optional)
  optional string description       = 5;
  // The number meters along the route that the waypoint is located
  optional float distance_into_route = 6;
}

message ZoneRange {
  // The minimum value in the range.
  optional int64 min = 1;
  // The maximum value in the range.
  optional int64 max = 2;
}

message Zones {
  optional HeartRateZoneRanges heart_rate = 1;
  optional PowerZoneRanges power         = 2;
}
